name: Normalize Gold Canonical Layer

on:
  workflow_dispatch:
    inputs:
      include_processed:
        description: "Reprocess rows already recorded in normalization_checkpoints"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: "Maximum rows per raw staging table to process"
        required: false
        default: "10000"
      batch_size:
        description: "Number of records to process before flushing to database"
        required: false
        default: "100"
      page_size:
        description: "Supabase page size for table scans"
        required: false
        default: "100"
      auto_alias_threshold:
        description: "Similarity threshold for auto-approving learned aliases"
        required: false
        default: "95"
      candidate_alias_threshold:
        description: "Similarity threshold for queueing alias candidates"
        required: false
        default: "75"

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r gold-normalize/requirements.txt

      - name: Run normalizer tests
        run: |
          python3 gold-normalize/test_normalizer.py

      - name: Run Gold canonical normalization
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          CMD="python3 gold-normalize/main.py \
            --limit ${{ inputs.limit }} \
            --batch-size ${{ inputs.batch_size }} \
            --page-size ${{ inputs.page_size }} \
            --auto-alias-threshold ${{ inputs.auto_alias_threshold }} \
            --candidate-alias-threshold ${{ inputs.candidate_alias_threshold }}"
          
          if [ "${{ inputs.include_processed }}" = "true" ]; then
            CMD="$CMD --include-processed"
          fi
          
          eval $CMD
